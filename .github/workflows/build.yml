name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release || echo "BUILD_EXIT_CODE=$?"

      - name: List APK files
        run: |
          echo "=== APK Files ==="
          find build -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No flutter-apk dir"

      - name: Commit APK to releases branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --all
          git checkout releases 2>/dev/null || git checkout -b releases
          mkdir -p apks
          cp build/app/outputs/flutter-apk/app-release.apk "apks/ai-tutor-v${{ github.run_number }}.apk"
          git add apks/
          git commit -m "APK Build #${{ github.run_number }}" || echo "No changes to commit"
          git push origin releases --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
