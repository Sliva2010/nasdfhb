name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release || echo "BUILD_EXIT_CODE=$?"

      - name: List APK files
        run: |
          echo "=== APK Files ==="
          find build -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No flutter-apk dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-Tutor-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ github.run_number }}
          name: "AI Tutor Build #${{ github.run_number }}"
          body: "Автоматическая сборка APK. Файл: `app-release.apk`"
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
